name: Sync Fork & Rebuild

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork con upstream
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/baccolss/EP/merge-upstream \
            -d '{"branch":"main"}')
          cat /tmp/response.json
          echo "HTTP status: $RESPONSE"
          if [ "$RESPONSE" = "409" ]; then
            echo "✅ Fork già aggiornato, nessun sync necessario"
          elif [ "$RESPONSE" = "200" ]; then
            echo "✅ Fork sincronizzato con successo!"
          else
            echo "⚠️ Risposta inattesa: $RESPONSE"
          fi

      - name: Force redeploy su Koyeb
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.KOYEB_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://app.koyeb.com/v1/services/${{ secrets.KOYEB_SERVICE_ID }}/redeploy \
            -d '{"skip_build": false}'
          echo "✅ Redeploy Koyeb triggerato!"
