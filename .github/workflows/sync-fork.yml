name: Sync Fork & Rebuild

on:
  schedule:
    - cron: '0 3 * * *'   # Ogni giorno alle 3:00 AM UTC
  workflow_dispatch:        # Permette anche di avviarlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork con upstream
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/baccolss/EP/merge-upstream \
            -d '{"branch":"main"}'
          echo "✅ Fork sincronizzato!"
